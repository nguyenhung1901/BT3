<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý khách hàng</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div>
        <h1>Quản lý khách hàng cửa hàng mỹ phẩm</h1>
      </div>
      <a href="/add.html" class="btn btn-primary">+ Thêm khách hàng</a>
    </div>

    <div class="card">
      <div class="filter-grid">
        <div class="form-group">
          <label for="keyword">Tìm kiếm</label>
          <input type="text" id="keyword" placeholder="Nhập tên, số điện thoại hoặc email" />
        </div>

        <div class="form-group">
          <label for="customerType">Loại khách hàng</label>
          <select id="customerType">
            <option value="">Tất cả</option>
            <option value="Thường">Thường</option>
            <option value="Thân thiết">Thân thiết</option>
            <option value="VIP">VIP</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sort">Sắp xếp</label>
          <select id="sort">
            <option value="newest">Mới nhất</option>
            <option value="oldest">Cũ nhất</option>
            <option value="name_asc">Tên A-Z</option>
            <option value="name_desc">Tên Z-A</option>
          </select>
        </div>

        <div class="form-group action-group">
          <button id="btnSearch" class="btn btn-success">Tìm</button>
          <button id="btnReset" class="btn btn-secondary">Làm mới</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-header">
        <h2>Danh sách khách hàng</h2>
        <span id="totalCustomers" class="badge">Tổng: 0</span>
      </div>

      <div id="messageBox"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>STT</th>
              <th>Mã KH</th>
              <th>Họ tên</th>
              <th>SĐT</th>
              <th>Email</th>
              <th>Loại KH</th>
              <th>Loại da</th>
              <th>Ngày tạo</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="customerTableBody">
            <tr>
              <td colspan="9" class="text-center">Đang tải dữ liệu...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
